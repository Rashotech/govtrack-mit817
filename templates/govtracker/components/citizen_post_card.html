<div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
    {% if post.media.first %}
    <img src="{{ post.media.first.file.url }}" alt="{{ post.title }}" class="w-full h-48 object-cover">
    {% else %}
    <div class="w-full h-48 bg-gray-200 flex items-center justify-center">
        <span class="text-gray-400">No image</span>
    </div>
    {% endif %}
    
    <div class="p-4">
        <div class="flex items-center justify-between mb-2">
            <span class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-800">
                {{ post.get_category_display }}
            </span>
            <span class="text-xs text-gray-500">{{ post.created_at|date:"M d, Y" }}</span>
        </div>
        
        <h3 class="text-lg font-semibold text-gray-900 mb-2 line-clamp-2">
            <a href="{% url 'govtracker:citizen_post_detail' post.reference_number %}" class="hover:text-blue-600">
                {{ post.title }}
            </a>
        </h3>
        
        <p class="text-sm text-gray-600 mb-3 line-clamp-2">{{ post.description }}</p>
        
        <div class="flex items-center text-xs text-gray-500 mb-3">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            {{ post.lga.name }}
        </div>
        
        <div class="flex items-center justify-between pt-3 border-t border-gray-100">
            <span class="text-xs text-gray-500">Ref: {{ post.reference_number }}</span>
            <div class="flex items-center text-sm text-gray-600">
                <svg class="w-5 h-5 mr-1 text-red-500" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/>
                </svg>
                {{ post.upvotes }}
            </div>
        </div>
    </div>
</div>
